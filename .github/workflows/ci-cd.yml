name: FE CI/CD

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - ".github/workflows/rollback.yml"
  push:
    branches: ["main", "dev"]
    paths-ignore:
      - ".github/workflows/rollback.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fe-ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_ID: ${{ github.sha }}
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/daeng-map-frontend
  MESSAGE: >-
    ${{
      github.event.pull_request.title ||
      github.event.head_commit.message ||
      github.workflow
    }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: daengdong

    environment:
      name: prod

    steps:
      - name: Mark CI start
        id: ci_time
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: daengdong/pnpm-lock.yaml

      - name: Install
        id: time_install
        run: |
          start=$(date +%s)
          pnpm install --frozen-lockfile
          end=$(date +%s)
          echo "start=${start}" >> "$GITHUB_OUTPUT"
          echo "end=${end}" >> "$GITHUB_OUTPUT"

      - name: Lint
        id: time_lint
        run: |
          start=$(date +%s)
          pnpm lint
          end=$(date +%s)
          echo "start=${start}" >> "$GITHUB_OUTPUT"
          echo "end=${end}" >> "$GITHUB_OUTPUT"

      - name: Test (if present)
        id: time_test
        run: |
          start=$(date +%s)
          set -euo pipefail

          if pnpm -s run | grep -qE '^test'; then
            pnpm test
            result="ran"
          else
            result="skipped"
            echo "[INFO] No test script. Skipping."
          fi

          end=$(date +%s)
          echo "start=${start}" >> "$GITHUB_OUTPUT"
          echo "end=${end}" >> "$GITHUB_OUTPUT"
          echo "result=${result}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: time_build
        uses: docker/build-push-action@v6
        with:
          context: daengdong
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_ID }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${{ vars.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }}
            NEXT_PUBLIC_MISSION_TEST_MODE=${{ vars.NEXT_PUBLIC_MISSION_TEST_MODE }}
            NEXT_PUBLIC_MOCK=${{ vars.NEXT_PUBLIC_MOCK }}
            NEXT_PUBLIC_USE_BFF_AUTH=${{ vars.NEXT_PUBLIC_USE_BFF_AUTH }}
            NEXT_PUBLIC_USE_BFF_SSE=${{ vars.NEXT_PUBLIC_USE_BFF_SSE }}
            NEXT_PUBLIC_ENABLE_DEV_LOGIN=${{ vars.NEXT_PUBLIC_ENABLE_DEV_LOGIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mark CI end
        id: ci_time_end
        if: always()
        run: echo "end=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Notify (CI)
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE: ${{ env.MESSAGE }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_ID: ${{ env.RELEASE_ID }}
          ACTOR: ${{ github.actor }}
          ENV_NAME: prod
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
          CI_START: ${{ steps.ci_time.outputs.start }}
          CI_END: ${{ steps.ci_time_end.outputs.end }}
          INSTALL_S: ${{ steps.time_install.outputs.start }}
          INSTALL_E: ${{ steps.time_install.outputs.end }}
          LINT_S: ${{ steps.time_lint.outputs.start }}
          LINT_E: ${{ steps.time_lint.outputs.end }}
          TEST_S: ${{ steps.time_test.outputs.start }}
          TEST_E: ${{ steps.time_test.outputs.end }}
          TEST_RESULT: ${{ steps.time_test.outputs.result }}
        run: |
          set -euo pipefail

          # WEBHOOK 없으면 스텝 종료
          [ -z "${WEBHOOK:-}" ] && echo "⚠️ DISCORD_WEBHOOK_URL이 공백이므로 본 단계를 스킵합니다." && exit 0

          # 안전한 산술 계산용 함수
          dur() { local s="${1:-}" e="${2:-}"; [ -n "$s" ] && [ -n "$e" ] && echo $((e - s)) || echo 0; }

          install_sec="$(dur "${INSTALL_S:-}" "${INSTALL_E:-}")"
          lint_sec="$(dur "${LINT_S:-}" "${LINT_E:-}")"
          ci_seconds="$(dur "${CI_START:-}" "${CI_END:-}")"
          test_sec="$(dur "${TEST_S:-}" "${TEST_E:-}")"

          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ [FE / ${ENV_NAME}] CI Success"
            COLOR=5763719
          else
            TITLE="❌ [FE / ${ENV_NAME}] CI Failed"
            COLOR=15548997
          fi

          test_label="${test_sec}s"
          if [ "${TEST_RESULT}" = "skipped" ]; then
            test_label="skipped"
          fi

          # 개행 문자 및 따옴표 제거, 200자로 자름
          safe_msg=$(echo "$MESSAGE" | tr '\n' ' ' | sed 's/"/\\"/g' | head -c 200)

          JSON_PAYLOAD=$(cat <<JSON
          {
            "embeds": [
              {
                "title": "$TITLE",
                "url": "$RUN_URL",
                "color": $COLOR,
                "description": "${safe_msg}",
                "fields": [
                  {"name":"Release ID","value":"\`${RELEASE_ID}\`","inline":false},
                  {"name":"Actor","value":"${ACTOR}","inline":true},
                  {"name":"Total CI","value":"${ci_seconds}s","inline":true},

                  {"name":"Install","value":"${install_sec}s","inline":true},
                  {"name":"Lint","value":"${lint_sec}s","inline":true},
                  {"name":"Test","value":"${test_label}","inline":true},

                  {"name":"Docker Image","value":"pushed","inline":true}
                ],
                "timestamp": "$TIMESTAMP"
              }
            ]
          }
          JSON
          )

          curl -sS -X POST -H "Content-Type: application/json" --data-binary "$JSON_PAYLOAD" "$WEBHOOK" || true

  cd:
    name: CD
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10

    # push일 때만 배포
    if: github.event_name == 'push'

    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    env:
      ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      MANIFEST_REPO: ${{ secrets.MANIFEST_REPO }}
      MANIFEST_BRANCH: ${{ secrets.MANIFEST_BRANCH }}
      MANIFEST_PATH: ${{ vars.MANIFEST_PATH }}

    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          ref: ${{ env.MANIFEST_BRANCH }}
          ssh-key: ${{ secrets.DAENG_MAP_DEPLOY_KEY }}
          path: manifest

      - name: Update image tag
        run: |
          cd manifest
          sed -i "s|tag:.*|tag: \"${{ env.RELEASE_ID }}\"|" ${{ env.MANIFEST_PATH }}
          echo "Updated image tag to: ${{ env.RELEASE_ID }}"
          grep "tag:" ${{ env.MANIFEST_PATH }}

      - name: Commit & push
        id: deploy
        run: |
          cd manifest
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.MANIFEST_PATH }}
          git commit -m "deploy: fe image ${{ env.RELEASE_ID }}"
          git push
